version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: rsfit-postgres
    environment:
      POSTGRES_DB: rsfit
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rsfit"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rsfit-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/rsfit
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=secret
      - SPRING_AI_VERTEX_AI_GEMINI_API_KEY=${SPRING_AI_VERTEX_AI_GEMINI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy

  frontend-web:
    build:
      context: ./frontend/web
      dockerfile: Dockerfile
    container_name: rsfit-frontend-web
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
